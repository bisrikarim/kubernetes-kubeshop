# secret-db.yaml
# Épisode 02 — Secret corrigé
#
# ✅ Correction : DB_NAME retiré du Secret
#                Il est déjà dans le ConfigMap → pas de doublon
#
# 🔐 Règle de séparation claire :
#    ConfigMap → tout ce qui n'est PAS sensible (host, port, nom de db, env)
#    Secret    → UNIQUEMENT les credentials (user, password, clés)
#
# ⚠️  En production, ne jamais committer ce fichier avec de vraies valeurs.
#     Utiliser : Sealed Secrets, HashiCorp Vault, ou AWS Secrets Manager.

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: kubeshop
  labels:
    app: backend
    episode: "02"
type: Opaque
data:
  # echo -n "admin" | base64
  DB_USER: YWRtaW4=               # "admin"

  # echo -n "kubeshop123" | base64
  DB_PASSWORD: a3ViZXNob3AxMjM=   # "kubeshop123"

  # echo -n "supersecretkey123" | base64
  APP_SECRET_KEY: c3VwZXJzZWNyZXRrZXkxMjM=   # "supersecretkey123"
